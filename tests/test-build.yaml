esphome:
  name: ci-build
  min_version: 2024.11.0
external_components:
  - source:
      type: local
      path: ../components
esp32:
  board: esp32dev
  variant: esp32
  framework:
    type: esp-idf
logger:
api:
ota:
  - platform: esphome
wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
packages:
  switch2_wake: !include ../switch2_master.yaml
