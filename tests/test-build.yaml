# CI-only base config. Exists purely to compile-test the package + component.
# Mirrors esp-home.yaml's runtime Wi-Fi provisioning (Improv + captive portal),
# so CI compiles those too and needs no secrets.yaml.
esphome:
  name: ci-build
  min_version: 2024.11.0
external_components:
  - source:
      type: local
      path: ../components
esp32:
  board: esp32dev
  variant: esp32
  framework:
    type: esp-idf
logger:
api:
ota:
  - platform: esphome
wifi:
  ap:
    ssid: "CI Fallback"
    password: "ci-fallback"
captive_portal:
improv_serial:
packages:
  switch2_wake: !include ../switch2_master.yaml
