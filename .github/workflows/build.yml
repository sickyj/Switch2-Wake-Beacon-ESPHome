name: Build

on:
  push:
    paths: ["**.yaml", "**.yml", "**.h", "**.cpp", "**.py", ".github/workflows/build.yml"]
  pull_request:
    paths: ["**.yaml", "**.yml", "**.h", "**.cpp", "**.py", ".github/workflows/build.yml"]
  workflow_dispatch:

jobs:
  compile:
    name: esphome compile (ESP-IDF)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install ESPHome
        run: pip install esphome

      - name: Stage dummy secrets
        run: |
          printf 'wifi_ssid: "ci"\nwifi_password: "ci-pass-123"\n' > tests/secrets.yaml
          printf 'wifi_ssid: "ci"\nwifi_password: "ci-pass-123"\n' > secrets.yaml

      - name: Validate example base config (esp-home.yaml)
        # Point the version refs at this branch so the example is validated
        # against the current code (release tags don't exist yet at PR time).
        env:
          REF: ${{ github.head_ref || github.ref_name }}
        run: |
          sed -E "s#@v[0-9]+\.[0-9]+\.[0-9]+#@${REF}#g; s#ref: v[0-9]+\.[0-9]+\.[0-9]+#ref: ${REF}#g" esp-home.yaml > esp-home.ci.yaml
          esphome config esp-home.ci.yaml

      - name: Compile
        run: esphome compile tests/test-build.yaml
