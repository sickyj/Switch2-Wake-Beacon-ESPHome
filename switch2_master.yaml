# =============================================================================
#  Switch 2 Wake Beacon - ESPHome package
#  Import this into your base config via the `packages:` block (see esp-home.yaml).
#  Your base config must supply: wifi/api/ota/logger, esp32 board, and the
#  esp-idf framework. This package only adds the wake/capture logic.
# =============================================================================

# Tunables - override any of these in your own base config's `substitutions:`
# block (your values win over these defaults).
substitutions:
  wake_flag_byte: "0x81"    # byte 16: the wake-trigger flag
  wake_bursts: "3"          # number of advertisement bursts sent per wake
  capture_timeout: "60s"    # auto-disable Capture Mode after this long
  # Advanced mode: when "true", the rarely-needed / destructive controls
  # (Clear Saved Data, Reboot, raw payload/MAC sensors) are hidden in Home
  # Assistant until you enable them per-entity. Set to "false" to show them all.
  hide_advanced: "true"

esphome:
  # Identifies the shared project in Home Assistant (and drives update
  # notifications when paired with dashboard_import). Bump on each release.
  project:
    name: "sickyj.switch2_wake_beacon"
    version: "2.1.0"
  on_boot:
    priority: 250
    then:
      # The BT MAC spoof lives in the switch2 external component (its .cpp
      # includes <esp_mac.h> at file scope), so no local header is needed.
      - lambda: 'esphome::switch2::spoof_bt_mac(id(saved_joycon_mac));'

esp32:
  framework:
    type: esp-idf

# Loads the switch2 component (compiles switch2.cpp + exposes spoof_bt_mac()).
# The component source is provided by external_components in your base config.
switch2:

# --- SWITCH 2 WAKE & CAPTURE LOGIC ---
esp32_ble:

globals:
  - id: saved_nintendo_payload
    type: std::string
    restore_value: yes
    initial_value: '""'
  - id: saved_joycon_mac
    type: std::string
    restore_value: yes
    initial_value: '""'

esp32_ble_tracker:
  scan_parameters:
    interval: 320ms
    window: 30ms
    active: false
  on_ble_advertise:
    - then:
        - lambda: |-
            if (id(capture_mode).state) {
              for (auto data : x.get_manufacturer_datas()) {
                auto native_uuid = data.uuid.get_uuid();
                // 0x0553 is Nintendo's BLE Company ID.
                if (native_uuid.len == 2 && native_uuid.uuid.uuid16 == 0x0553) {
                  if (data.data.size() == 24) {
                    std::string clean_hex = "";
                    for(size_t i = 0; i < data.data.size(); i++) {
                      char buf[3];
                      sprintf(buf, "%02X", data.data[i]);
                      clean_hex += buf;
                    }

                    id(saved_nintendo_payload) = clean_hex;
                    id(saved_joycon_mac) = x.address_str();

                    ESP_LOGI("BLE_CAPTURE", "SUCCESS! Payload Saved: %s", clean_hex.c_str());
                    ESP_LOGI("BLE_CAPTURE", "SUCCESS! MAC Saved: %s", x.address_str().c_str());

                    id(wake_status).publish_state("Captured Joy-Con - rebooting to apply MAC");
                    id(capture_mode).turn_off();

                    // Reboot so on_boot applies the new MAC to the radio.
                    ESP_LOGI("BLE_CAPTURE", "Rebooting to apply hardware MAC...");
                    delay(500);
                    esp_restart();
                  }
                }
              }
            }

switch:
  - platform: template
    name: "Capture Mode"
    id: capture_mode
    icon: "mdi:bluetooth-audio"
    entity_category: config    # setup control - grouped under Configuration
    optimistic: true
    # Safety net: auto-disable after ${capture_timeout} if no Joy-Con is seen,
    # so the device doesn't sit scanning forever.
    on_turn_on:
      - lambda: 'id(wake_status).publish_state("Capture Mode ON - waiting for Joy-Con...");'
      - delay: ${capture_timeout}
      - if:
          condition:
            switch.is_on: capture_mode
          then:
            - switch.turn_off: capture_mode
            - lambda: |-
                ESP_LOGW("BLE_CAPTURE", "Capture timed out - no Joy-Con found.");
                id(wake_status).publish_state("Capture timed out - no Joy-Con found");

text_sensor:
  - platform: template
    name: "Saved Nintendo Payload"
    id: captured_payload
    icon: "mdi:memory"
    entity_category: diagnostic       # advanced: raw captured data
    disabled_by_default: ${hide_advanced}
    lambda: |-
      return id(saved_nintendo_payload);
    update_interval: 10s

  - platform: template
    name: "Saved Joy-Con MAC"
    id: captured_mac
    icon: "mdi:identifier"
    entity_category: diagnostic       # advanced: raw captured data
    disabled_by_default: ${hide_advanced}
    lambda: |-
      return id(saved_joycon_mac);
    update_interval: 10s

  # Human-readable status of the last action - kept visible as useful feedback.
  - platform: template
    name: "Wake Status"
    id: wake_status
    icon: "mdi:information-outline"
    entity_category: diagnostic
    update_interval: never

button:
  - platform: template
    name: "Wake Switch 2"
    id: wake_switch
    icon: "mdi:nintendo-switch"
    on_press:
      - lambda: |-
          std::string hex = id(saved_nintendo_payload);
          std::string mac_str = id(saved_joycon_mac);
          if (hex.length() < 48 || mac_str.empty()) {
            ESP_LOGE("BLE_WAKE", "Missing payload or MAC. Run Capture Mode first!");
            id(wake_status).publish_state("Cannot wake - no saved data");
            return;
          }
          id(wake_status).publish_state("Broadcasting wake beacon...");

      # Send ${wake_bursts} short bursts. A single advertise already re-broadcasts
      # every ~30ms, but spaced bursts better survive a missed window on the console.
      - repeat:
          count: ${wake_bursts}
          then:
            - lambda: |-
                std::string hex = id(saved_nintendo_payload);
                if (hex.length() < 48) return;

                // Build the exact 31-byte advertisement.
                uint8_t raw_adv_data[31] = {
                  0x02, 0x01, 0x06,   // Flags
                  0x1B, 0xFF,         // Length + Manufacturer Specific type
                  0x53, 0x05          // Company ID 0x0553 (little-endian)
                };
                for(int i = 0; i < 24; i++) {
                  std::string byte_str = hex.substr(i * 2, 2);
                  raw_adv_data[7 + i] = (uint8_t) strtol(byte_str.c_str(), NULL, 16);
                }

                // Critical wake-trigger flag.
                raw_adv_data[16] = ${wake_flag_byte};

                esp_ble_adv_params_t adv_params = {
                    .adv_int_min = 0x0020,
                    .adv_int_max = 0x0040,
                    .adv_type = ADV_TYPE_NONCONN_IND,
                    // PUBLIC: the radio already wears the Joy-Con MAC.
                    .own_addr_type = BLE_ADDR_TYPE_PUBLIC,
                    .peer_addr = {0,0,0,0,0,0},
                    .peer_addr_type = BLE_ADDR_TYPE_PUBLIC,
                    .channel_map = ADV_CHNL_ALL,
                    .adv_filter_policy = ADV_FILTER_ALLOW_SCAN_ANY_CON_ANY,
                };

                esp_ble_gap_config_adv_data_raw(raw_adv_data, sizeof(raw_adv_data));
                esp_ble_gap_start_advertising(&adv_params);
                ESP_LOGI("BLE_WAKE", "Broadcasting Switch 2 wake beacon (Exact Public MAC)!");
            - delay: 700ms
            - lambda: 'esp_ble_gap_stop_advertising();'
            - delay: 150ms

      - lambda: |-
          ESP_LOGI("BLE_WAKE", "Wake beacon finished.");
          id(wake_status).publish_state("Wake beacon sent");

  - platform: template
    name: "Clear Saved Data"
    id: clear_data
    icon: "mdi:delete"
    entity_category: config           # advanced + destructive
    disabled_by_default: ${hide_advanced}
    on_press:
      - lambda: |-
          id(saved_nintendo_payload) = "";
          id(saved_joycon_mac) = "";
          id(wake_status).publish_state("Data cleared - rebooting to restore real MAC");
          ESP_LOGI("CLEAR", "Cleared. Rebooting to drop the spoofed MAC...");
      # Reboot so on_boot skips spoofing and the real hardware MAC returns.
      - delay: 500ms
      - lambda: 'esp_restart();'

  # Boot-time MAC spoofing makes a reboot button genuinely useful.
  - platform: restart
    name: "Reboot Device"
    icon: "mdi:restart"
    entity_category: config           # advanced
    disabled_by_default: ${hide_advanced}
