# =============================================================================
#  Example base config for the Switch 2 Wake Beacon.
#  Copy the relevant parts into your own ESPHome device config.
#  The wake/capture logic lives in the imported package at the bottom.
#
#  ONE-TIME SETUP: download `custom_mac.h` from this repo into the SAME folder
#  as this config. ESPHome resolves the package's `includes:` against YOUR config
#  directory, so the header must live locally (it can't be fetched over the URL).
# =============================================================================

esphome:
  name: switch-wake-up
  friendly_name: Switch Wake-Up
  min_version: 2024.11.0

# esp-idf framework is REQUIRED (the Arduino BLE stack can't do the raw
# advertising + hardware MAC spoofing this project needs).
esp32:
  board: firebeetle32   # change to your board
  variant: esp32
  framework:
    type: esp-idf

# Standard integrations
logger:
api:
ota:
  - platform: esphome

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  # Fallback hotspot so the device stays recoverable if Wi-Fi drops.
  ap:
    ssid: "Switch Wake Fallback"
    password: "switchwake"   # 8+ chars; change this

captive_portal:

# Optional: override any package tunable here (your values win).
# substitutions:
#   wake_bursts: "5"
#   capture_timeout: "90s"

# Import the Switch 2 Wake Beacon logic from this GitHub repo.
# Pin `ref:` to a release tag for stability, or use `main` for the latest.
packages:
  switch2_wake:
    url: https://github.com/sickyj/Switch2-Wake-Beacon-ESPHome
    files: [switch2_master.yaml]
    ref: v1.0.0
    refresh: 1d
